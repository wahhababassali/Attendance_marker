    .progress { color: blue; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #log { background: #f5f5f5; padding: 10px; max-height: 400px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Import Admin Codes to Firebase</h1>

    ];

    const log = document.getElementById('log');
    const btn = document.getElementById('importBtn');

    function addLog(msg, type) {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = msg;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      log.innerHTML = '';
      
      const expiresAt = new Date();
      expiresAt.setMonth(expiresAt.getMonth() + 4);
      const expiresStr = expiresAt.toISOString();

      let success = 0;
      let failed = 0;

      for (const code of adminCodes) {
        try {
          await setDoc(doc(db, 'adminCodes', code), {
            code: code,
            createdAt: new Date().toISOString(),
            expiresAt: expiresStr,
            isActive: true,
            validityMonths: 4
          });
          success++;
          addLog(`✅ Imported: ${code}`, 'success');
        } catch (error) {
          failed++;
          addLog(`❌ Failed: ${code} - ${error.message}`, 'error');
        }
        
        // Small delay to avoid rate limiting
        await new Promise(r => setTimeout(r, 50));
      }

      addLog(`\n🎉 Complete! Success: ${success}, Failed: ${failed}`, 'progress');
      btn.disabled = false;
    });
  </script>
</body>
